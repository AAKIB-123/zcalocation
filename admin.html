<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ZCA - Admin Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
<style>
  *{box-sizing:border-box}
  body{margin:0;font-family:'Poppins',sans-serif;background:#0b0b0b;color:#fff;display:flex;min-height:100vh}
  
  /* Sidebar Navigation */
  .sidebar{width:260px;background:#000;border-right:2px solid #e50914;padding:24px;display:flex;flex-direction:column;gap:20px}
  .sidebar h2{font-size:1.2rem;margin:0;color:#e50914;text-transform:uppercase;letter-spacing:1px}
  .menu-btn{background:none;border:none;color:#aaa;text-align:left;padding:12px 16px;border-radius:8px;cursor:pointer;font-weight:600;display:flex;align-items:center;gap:12px;transition:.2s}
  .menu-btn:hover, .menu-btn.active{background:#141414;color:#fff;border-left:3px solid #e50914}
  
  /* Main Panel Container */
  .main-panel{flex:1;padding:40px;max-width:1100px}
  .panel-section{background:#141414;border-radius:18px;padding:30px;border-left:5px solid #e50914;display:none}
  .panel-section.active{display:block}
  
  /* Form Formatting Layouts */
  .form-group{margin-bottom:20px}
  label{display:block;margin-bottom:8px;font-weight:600;color:#ccc;font-size:0.9rem}
  input, textarea, select{width:100%;padding:12px 16px;background:#1b1b1b;border:1px solid #333;border-radius:8px;color:#fff;font-family:inherit;font-size:0.95rem;transition:.2s}
  input:focus, textarea:focus, select:focus{outline:none;border-color:#e50914}
  
  .btn-save{background:linear-gradient(135deg,#e50914,#ff2a2a);color:#fff;border:none;padding:14px 28px;border-radius:8px;font-weight:700;cursor:pointer;transition:.3s;display:inline-flex;align-items:center;gap:8px}
  .btn-save:hover{transform:scale(1.02);box-shadow:0 5px 15px rgba(229,9,20,0.3)}
  
  /* Gallery Content Creator Engine Grid */
  .media-creator{background:#1b1b1b;padding:20px;border-radius:12px;margin-bottom:24px;border:1px dashed #444}
  .grid-3{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px;margin-bottom:15px}
  
  .admin-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;margin-top:20px}
  .admin-card{position:relative;border-radius:12px;overflow:hidden;aspect-ratio:4/3;background:#1b1b1b;border:1px solid #333}
  .admin-card img, .admin-card video{width:100%;height:100%;object-fit:cover}
  
  .card-type-badge{position:absolute;top:10px;left:10px;background:rgba(0,0,0,0.7);padding:4px 8px;border-radius:6px;font-size:0.75rem;font-weight:600}
  .btn-delete{position:absolute;top:10px;right:10px;background:#e50914;color:#fff;border:none;width:30px;height:30px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s}
  .btn-delete:hover{transform:scale(1.1)}
</style>
</head>
<body>

  <!-- Navigation Control Strip -->
  <div class="sidebar">
    <h2>ZCA Controls</h2>
    <hr style="border-color:#222; margin:5px 0 15px 0;">
    <button class="menu-btn active" onclick="switchTab('business-details', this)"><i class="fa-solid fa-gear"></i> Business Info</button>
    <button class="menu-btn" onclick="switchTab('gallery-management', this)"><i class="fa-solid fa-images"></i> Media Manager</button>
  </div>

  <!-- Central Display Workspace -->
  <div class="main-panel">
    
    <!-- SECTION 1: CORE BUSINESS ATTRIBUTES -->
    <div id="business-details" class="panel-section active">
      <h2 style="margin-top:0;">Manage <span>Website Details</span></h2>
      <p style="margin-bottom:30px; color:#aaa;">Update your shop location metadata, phone contact text chains, and tracking URLs.</p>
      
      <div class="form-group">
        <label>Company Banner Title</label>
        <input type="text" id="shopName" value="Zakaria Car Accessories">
      </div>
      
      <div class="form-group">
        <label>Physical Address Coordinates</label>
        <textarea id="shopAddress" rows="3">Shop no-A5, ABC Complex, Opp. Over Bridge, Nandelav Chowkdi, Bholav, Bharuch – 392001, Gujarat</textarea>
      </div>
      
      <div class="grid-3" style="grid-template-columns: 1fr 1fr; margin-bottom:0;">
        <div class="form-group">
          <label>Primary Phone Number</label>
          <input type="text" id="phone1" value="+91 97147 99474">
        </div>
        <div class="form-group">
          <label>Backup Phone Line</label>
          <input type="text" id="phone2" value="+91 99139 82544">
        </div>
      </div>
      
      <div class="form-group">
        <label><i class="fa-brands fa-facebook" style="color:#1877f2"></i> Facebook Link Link</label>
        <input type="url" id="fbLink" value="https://www.facebook.com/zakaria.car.acc/">
      </div>
      
      <div class="form-group">
        <label><i class="fa-brands fa-instagram" style="color:#e4405f"></i> Instagram Profile URL</label>
        <input type="url" id="instaLink" value="https://www.instagram.com/zakaria_car_accessories/">
      </div>
      
      <div class="form-group">
        <label><i class="fa-brands fa-youtube" style="color:#ff0000"></i> YouTube Creator Link</label>
        <input type="url" id="ytLink" value="https://www.youtube.com/@ZAKARIA_CAR_ACCESSORIES">
      </div>
      
      <button class="btn-save" onclick="saveBusinessDetails()"><i class="fa-solid fa-floppy-disk"></i> Save Core Profile</button>
    </div>

    <!-- SECTION 2: LIVE MEDIA STORAGE CONTROLS -->
    <div id="gallery-management" class="panel-section">
      <h2 style="margin-top:0;">Manage <span>Photos & Videos</span></h2>
      <p style="margin-bottom:30px; color:#aaa;">Append or erase multimedia project items visible inside the main showcase window block.</p>
      
      <div class="media-creator">
        <h4 style="margin:0 0 15px 0; font-size:1rem; color:#fff;">Register New Showcase Element</h4>
        <div class="grid-3">
          <div>
            <label>Asset Format Type</label>
            <select id="mediaType">
              <option value="image">Image Asset (.jpg / .png)</option>
              <option value="video">Video Loop (.mp4)</option>
            </select>
          </div>
          <div style="grid-column: span 2;">
            <label>Local Path File Name / Server URL Link</label>
            <input type="text" id="mediaSrc" placeholder="e.g., bumper-installation.jpg or video2.mp4">
          </div>
        </div>
        <button class="btn-save" style="padding:10px 20px; font-size:0.85rem;" onclick="addMediaItem()"><i class="fa-solid fa-plus"></i> Inject Item Card</button>
      </div>

      <h3 style="font-size:1.1rem; margin-top:30px; border-bottom:1px solid #222; padding-bottom:10px;">Live Gallery Item Review</h3>
      <div class="admin-grid" id="adminGalleryGrid">
        <!-- Initial runtime placeholders rendered safely via UI script array below -->
      </div>
    </div>

  </div>

<script>
  // Active Navigation UI Control System
  function switchTab(tabId, element) {
    document.querySelectorAll('.panel-section').forEach(sec => sec.classList.remove('active'));
    document.querySelectorAll('.menu-btn').forEach(btn => btn.classList.remove('active'));
    
    document.getElementById(tabId).classList.add('active');
    element.classList.add('active');
  }

  // Base Hardcoded Media State System Array
  let mediaDatabase = [
    { id: 1, type: 'image', src: 'photo1.jpg' },
    { id: 2, type: 'image', src: 'photo2.jpg' },
    { id: 3, type: 'video', src: 'video1.mp4' }
  ];

  // Output Rendering Script Engine Sequence
  function renderAdminGallery() {
    const grid = document.getElementById('adminGalleryGrid');
    grid.innerHTML = '';
    
    mediaDatabase.forEach(item => {
      const card = document.createElement('div');
      card.className = 'admin-card';
      
      let previewElement = item.type === 'image' 
        ? `<img src="${item.src}" onerror="this.src='https://placehold.co/400x300/1b1b1b/ffffff?text=Image+Asset'">`
        : `<video src="${item.src}" muted></video>`;
        
      card.innerHTML = `
        <span class="card-type-badge">${item.type.toUpperCase()}</span>
        <button class="btn-delete" onclick="deleteMediaItem(${item.id})"><i class="fa-solid fa-trash-can"></i></button>
        ${previewElement}
      `;
      grid.appendChild(card);
    });
  }

  // Inject Media Instance Module Handler
  function addMediaItem() {
    const type = document.getElementById('mediaType').value;
    const src = document.getElementById('mediaSrc').value.trim();
    
    if(!src) {
      alert('Please fill out the local path file name link field before confirming creation steps.');
      return;
    }
    
    const newItem = {
      id: Date.now(),
      type: type,
      src: src
    };
    
    mediaDatabase.push(newItem);
    document.getElementById('mediaSrc').value = '';
    renderAdminGallery();
    alert('Showcase media instance injected successfully into processing stack.');
  }

  // Remove Media Module Process
  function deleteMediaItem(id) {
    if(confirm('Are you certain you want to purge this media asset structure element?')) {
      mediaDatabase = mediaDatabase.filter(item => item.id !== id);
      renderAdminGallery();
    }
  }

  // Profile Save Confirmation Prompt Dialog Hook
  function saveBusinessDetails() {
    alert('Business information updates stored safely to system staging layout memory cache buffers!');
  }

  // Run initial gallery matrix load sequence on bootstrap load
  renderAdminGallery();
</script>
</body>
</html>
